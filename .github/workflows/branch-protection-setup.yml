name: Setup Branch Protection

on:
  workflow_dispatch:  # allows manual trigger

jobs:
  setup-branch-protection:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to update branch protection

    steps:
      - name: Setup branch protection for main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BRANCH_PROTECTION_PAT }}
          script: |
            try {
              await github.rest.repos.updateBranchProtection({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: "main",
                required_pull_request_reviews: {
                  required_approving_review_count: 1,
                  dismiss_stale_reviews: true
                },
                required_status_checks: null,
                enforce_admins: true,
                required_linear_history: true,
                allow_force_pushes: false,
                allow_deletions: false,
                required_conversation_resolution: true,
                restrictions: null
              });
              console.log("✅ Branch protection configured successfully for main");
            } catch (error) {
              console.log("❌ Failed to configure branch protection");
              console.log(error.message);
            }