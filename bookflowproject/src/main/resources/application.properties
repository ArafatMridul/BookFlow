# Database Configuration - RENDER (Using environment variables)
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}

# JPA Settings
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Data Initialization - Run AFTER Hibernate creates tables
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# Server Configuration
server.port=${PORT:8080}

# Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JWT Configuration
app.jwt.secret=${JWT_SECRET:mySecretKeyForJWTGenerationWithEnoughLengthForHS512AlgorithmMustBeVeryLongAndSecure123}
app.jwt.expiration=86400000

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.servlet.content-type=text/html

# Static Resources
spring.web.resources.static-locations=classpath:/static/,classpath:/META-INF/resources/webjars/
spring.web.resources.cache.period=0

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.example.bookflowproject=DEBUG
logging.level.org.hibernate.SQL=DEBUG