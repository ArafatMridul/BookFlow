# Database Configuration
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5433/bookflow}
spring.datasource.username=${JDBC_DATABASE_USERNAME:postgres}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Data Initialization
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.jpa.defer-datasource-initialization=true

# Server Configuration
server.port=${PORT:8085}
server.address=0.0.0.0

# Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:production}

# JWT
app.jwt.secret=${JWT_SECRET:ao57W4a8eJVQgFtPJp616JDdBUK1hw80v0KdE/085qcDavojNgAGJLcbFjWlL4yA}
app.jwt.expiration=86400000

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Static Resources
spring.web.resources.static-locations=classpath:/static/,classpath:/META-INF/resources/webjars/

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.example.bookflowproject=DEBUG
logging.level.org.hibernate.SQL=DEBUG

server.forward-headers-strategy=native
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto
# Trust all proxy IPs - required for cloud platforms (Render, Railway, etc.)
# where the reverse proxy IP may not be in Tomcat's default trusted range
server.tomcat.remoteip.internal-proxies=.*
