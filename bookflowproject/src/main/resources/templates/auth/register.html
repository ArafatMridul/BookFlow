<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Register - BookFlow</title>
  <link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="/webjars/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">
<div class="container">
  <div class="row justify-content-center mt-5">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow-lg border-0 rounded-lg">
        <div class="card-header bg-primary text-white text-center py-4">
          <h3 class="mb-0">
            <i class="fas fa-user-plus me-2"></i>Create Account
          </h3>
        </div>
        <div class="card-body p-4">

          <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${error}">Error message</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>

          <form th:action="@{/register}" method="post" th:object="${signupRequest}" id="registerForm">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="firstName" class="form-label">First Name</label>
                <input type="text" class="form-control" id="firstName" th:field="*{firstName}"
                       placeholder="Enter first name" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="lastName" class="form-label">Last Name</label>
                <input type="text" class="form-control" id="lastName" th:field="*{lastName}"
                       placeholder="Enter last name" required>
              </div>
            </div>

            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input type="text" class="form-control" id="username" th:field="*{username}"
                     placeholder="Choose a username" required minlength="3" maxlength="20">
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input type="email" class="form-control" id="email" th:field="*{email}"
                     placeholder="Enter your email" required>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" th:field="*{password}"
                     placeholder="Create a password" required minlength="6">
              <small class="text-muted">Password must contain at least 6 characters</small>
            </div>

            <div class="mb-3">
              <label for="confirmPassword" class="form-label">Confirm Password</label>
              <input type="password" class="form-control" id="confirmPassword"
                     placeholder="Confirm your password" required>
              <div class="invalid-feedback" id="passwordError">Passwords do not match</div>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                <i class="fas fa-user-plus me-2"></i>Register
              </button>
            </div>
          </form>

          <hr class="my-4">

          <div class="text-center">
            <p class="mb-0">Already have an account?
              <a th:href="@{/login}" class="text-primary">Login here</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script>
  document.getElementById('registerForm').addEventListener('submit', function(e) {
    var password = document.getElementById('password').value;
    var confirmPassword = document.getElementById('confirmPassword').value;
    if (password !== confirmPassword) {
      e.preventDefault();
      document.getElementById('confirmPassword').classList.add('is-invalid');
    }
  });
  document.getElementById('confirmPassword').addEventListener('input', function() {
    var password = document.getElementById('password').value;
    if (this.value === password) {
      this.classList.remove('is-invalid');
      this.classList.add('is-valid');
    } else {
      this.classList.remove('is-valid');
      this.classList.add('is-invalid');
    }
  });
</script>
</body>
</html>
