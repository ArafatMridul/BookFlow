<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Search Patrons - BookFlow</title>
	<link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css">
	<link rel="stylesheet" href="/webjars/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="d-flex" id="wrapper">
	<div class="sidebar bg-dark text-white" id="sidebar">
		<div class="sidebar-header p-3 text-center">
			<i class="fas fa-book-open fa-2x mb-2"></i>
			<h5 class="mb-0">BookFlow</h5>
			<small class="text-muted">Librarian Portal</small>
		</div>
		<hr class="text-secondary mx-3">
		<ul class="nav flex-column px-2">
		    <li class="nav-item"><a class="nav-link text-white-50" href="/librarian/dashboard"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a></li>
		    <li class="nav-item"><a class="nav-link text-white-50" href="/librarian/books/manage"><i class="fas fa-book me-2"></i>Manage Books</a></li>
		    <li class="nav-item"><a class="nav-link text-white-50" href="/librarian/books/add"><i class="fas fa-circle-plus me-2"></i>Add Books</a></li>
			<li class="nav-item"><a class="nav-link active text-white" href="/librarian/patrons"><i class="fas fa-users me-2"></i>Search Patrons</a></li>
			<li class="nav-item"><a class="nav-link text-white-50" href="/librarian/borrowings"><i class="fas fa-hand-holding-heart me-2"></i>Borrowing Management</a></li>
		</ul>
		<div class="sidebar-footer p-3 mt-auto">
			<div class="d-flex align-items-center">
				<i class="fas fa-user-circle fa-2x me-2"></i>
				<div>
					<small class="d-block fw-bold" th:text="${username}">Librarian</small>
					<span class="badge bg-info">Librarian</span>
				</div>
			</div>
			<form th:action="@{/logout}" method="post" class="mt-3">
				<button type="submit" class="btn btn-outline-light btn-sm w-100">
					<i class="fas fa-sign-out-alt me-2"></i>Logout
				</button>
			</form>
		</div>
	</div>

	<div class="main-content flex-grow-1">
		<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
			<div class="container-fluid">
				<button class="btn btn-link text-dark" id="sidebarToggle"><i class="fas fa-bars"></i></button>
				<span class="navbar-text fw-bold text-primary">Search Patrons</span>
				<span class="navbar-text" th:text="${username}">Librarian</span>
			</div>
		</nav>

		<div class="container-fluid p-4">
			<div class="card border-0 shadow-sm">
				<div class="card-header bg-transparent border-0 pt-4 px-4 d-flex justify-content-between align-items-center">
					<h5 class="mb-0"><i class="fas fa-users me-2 text-primary"></i>Patron Directory</h5>
					<span class="badge bg-primary" th:text="${patrons != null ? patrons.size() : 0}">0</span>
				</div>
				<div class="card-body px-4 pb-4">
					<form th:action="@{/librarian/patrons}" method="get" class="d-flex gap-2 mb-4">
						<label for="patron-search" class="visually-hidden">Search patrons</label>
						<input id="patron-search" type="text" name="search" class="form-control" placeholder="Search by username or email" th:value="${search}">
						<button type="submit" class="btn btn-outline-primary">Search</button>
						<a href="/librarian/patrons" class="btn btn-outline-secondary">Clear</a>
					</form>

					<div class="table-responsive">
						<table class="table align-middle">
							<thead>
							<tr>
								<th>Username</th>
								<th>Email</th>
								<th>Name</th>
								<th>Roles</th>
							</tr>
							</thead>
							<tbody>
							<tr th:each="patron : ${patrons}">
								<td class="fw-semibold" th:text="${patron.username}">username</td>
								<td th:text="${patron.email}">email</td>
								<td th:text="${(patron.firstName != null ? patron.firstName : '') + ' ' + (patron.lastName != null ? patron.lastName : '')}">name</td>
								<td>
									<span th:each="role : ${patron.roles}" class="badge bg-info text-dark me-1" th:text="${role.name}">USER</span>
								</td>
							</tr>
							<tr th:if="${patrons == null or #lists.isEmpty(patrons)}">
								<td colspan="4" class="text-center text-muted py-4">No patrons found.</td>
							</tr>
							</tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>

<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
