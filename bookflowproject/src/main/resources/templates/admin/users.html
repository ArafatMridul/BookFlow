<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - BookFlow</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="/webjars/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="d-flex" id="wrapper">
    <div class="sidebar bg-dark text-white" id="sidebar">
        <div class="sidebar-header p-3 text-center">
            <i class="fas fa-book-open fa-2x mb-2"></i>
            <h5 class="mb-0">BookFlow</h5>
            <small class="text-muted">Admin Panel</small>
        </div>
        <hr class="text-secondary mx-3">
        <ul class="nav flex-column px-2">
            <li class="nav-item"><a class="nav-link text-white-50" href="/admin/dashboard"><i class="fas fa-tachometer-alt me-2"></i>Dashboard</a></li>
            <li class="nav-item"><a class="nav-link active text-white" href="/admin/users"><i class="fas fa-users me-2"></i>Manage Users</a></li>
            <li class="nav-item"><a class="nav-link text-white-50" href="/admin/reports"><i class="fas fa-chart-bar me-2"></i>Reports</a></li>
            <li class="nav-item"><a class="nav-link text-white-50" href="/admin/books"><i class="fas fa-book me-2"></i>Book Overview</a></li>
        </ul>
        <div class="sidebar-footer p-3 mt-auto">
            <div class="d-flex align-items-center">
                <i class="fas fa-user-circle fa-2x me-2"></i>
                <div>
                    <small class="d-block fw-bold" th:text="${username}">Admin</small>
                    <span class="badge bg-danger">Admin</span>
                </div>
            </div>
            <form th:action="@{/logout}" method="post" class="mt-3">
                <button type="submit" class="btn btn-outline-light btn-sm w-100">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                </button>
            </form>
        </div>
    </div>

    <div class="main-content flex-grow-1">
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
            <div class="container-fluid">
                <button class="btn btn-link text-dark" id="sidebarToggle"><i class="fas fa-bars"></i></button>
                <span class="navbar-text fw-bold text-primary">Manage Users</span>
                <div class="d-flex align-items-center">
                    <a href="/profile" class="btn btn-light btn-sm me-3"><i class="fas fa-user me-1"></i>Profile</a>
                    <span class="navbar-text" th:text="${username}">Admin</span>
                </div>
            </div>
        </nav>

        <div class="container-fluid p-4">
            <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle me-2"></i><span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-triangle-exclamation me-2"></i><span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-3"><div class="card stat-card border-0 shadow-sm h-100"><div class="card-body"><h6 class="text-muted text-uppercase small fw-bold mb-1">Total Users</h6><h3 class="mb-0 fw-bold" th:text="${totalUsers}">0</h3></div></div></div>
                <div class="col-md-3"><div class="card stat-card border-0 shadow-sm h-100"><div class="card-body"><h6 class="text-muted text-uppercase small fw-bold mb-1">Admins</h6><h3 class="mb-0 fw-bold" th:text="${adminCount}">0</h3></div></div></div>
                <div class="col-md-3"><div class="card stat-card border-0 shadow-sm h-100"><div class="card-body"><h6 class="text-muted text-uppercase small fw-bold mb-1">Librarians</h6><h3 class="mb-0 fw-bold" th:text="${librarianCount}">0</h3></div></div></div>
                <div class="col-md-3"><div class="card stat-card border-0 shadow-sm h-100"><div class="card-body"><h6 class="text-muted text-uppercase small fw-bold mb-1">Disabled</h6><h3 class="mb-0 fw-bold" th:text="${disabledCount}">0</h3></div></div></div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-transparent border-0 pt-4 px-4 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="fas fa-users me-2 text-primary"></i>User Directory</h5>
                    <span class="badge bg-primary" th:text="${users != null ? users.size() : 0}">0</span>
                </div>
                <div class="card-body px-4 pb-4">
                    <form th:action="@{/admin/users}" method="get" class="d-flex gap-2 mb-4">
                        <label for="user-search" class="visually-hidden">Search users</label>
                        <input id="user-search" type="text" name="search" class="form-control" placeholder="Search by username, email, or role" th:value="${search}">
                        <button type="submit" class="btn btn-outline-primary">Search</button>
                        <a href="/admin/users" class="btn btn-outline-secondary">Clear</a>
                    </form>

                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                            <tr>
                                <th>Username</th>
                                <th>Email</th>
                                <th>Roles</th>
                                <th>Status</th>
                                <th class="text-end">Action</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users}">
                                <td class="fw-semibold" th:text="${user.username}">username</td>
                                <td th:text="${user.email}">email</td>
                                <td>
                                    <span th:each="role : ${user.roles}" class="badge bg-info text-dark me-1" th:text="${role.name}">USER</span>
                                </td>
                                <td>
                                    <span class="badge bg-success" th:if="${user.enabled}">Enabled</span>
                                    <span class="badge bg-danger" th:unless="${user.enabled}">Disabled</span>
                                </td>
                                <td class="text-end">
                                    <form th:action="@{/admin/users/{id}/toggle-enabled(id=${user.id})}" method="post" class="d-inline">
                                        <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button type="submit" class="btn btn-sm" th:classappend="${user.enabled} ? 'btn-outline-danger' : 'btn-outline-success'">
                                            <i class="fas" th:classappend="${user.enabled} ? 'fa-ban' : 'fa-check'"></i>
                                            <span th:text="${user.enabled} ? 'Disable' : 'Enable'">Toggle</span>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${users == null or #lists.isEmpty(users)}">
                                <td colspan="5" class="text-center text-muted py-4">No users found.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
