spring.datasource.url=jdbc:h2:mem:bookflow-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# Test-only JWT configuration to satisfy JwtProperties during context startup
app.jwt.secret=test-secret-key-for-jwt-signing-32-bytes-minimum
app.jwt.expiration=86400000

logging.level.org.springframework.security=ERROR
logging.level.org.hibernate.SQL=ERROR
